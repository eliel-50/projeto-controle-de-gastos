<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DE GASTOS</title>
    <link rel="stylesheet" href="Controle.css">
     <script src="Controle.js"></script>
</head>
<body>
    <main>
        <h1>Controle de Gastos</h1>
        <form>
            <input id="valor" type="number" placeholder="Digite o valor dos gastos"/>
            <select id="categoria">
            <option value="alimentacao">Alimentação</option>
            <option value="transporte">Transporte</option>
            <option value="lazer">Lazer</option>
            <option value="outros">Outros</option>
            </select>

            <button  onclick="adicionarGasto()"   type="button">Adicionar</button>
        </form>
        <p id="alimentacao">Alimentaçäo: R$ 0,00</p>
        <p id="transporte">Transporte: R$ 0,00</p>
        <p id="lazer">Lazer: R$ 0,00</p>
        <p id="outros">Outros: R$ 0,00</p>
        <p id="total">Total: R$ 0,00</p>
    </main>
</body>
</html>
